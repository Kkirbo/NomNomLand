<input type="text" name="text" id="chatInput" placeholder="Enter your message">
<button>Send</button>
<p></p>
<script>
    const prompt = "You are a chatbot for a restaurant that makes meals with computer jokes like 'fullstack lasagna'. Answer to the client's requests by providing in depth knowledge and don't forget to make computer word plays!";
    document.querySelector("button").addEventListener("click", async (e) => {
    const input = document.querySelector("input").value;
    document.querySelector('p').innerHTML += input + '<br>';
    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
            Authorization: 'Bearer <api-key>',
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            model: 'openrouter/free',
            messages: [
                { role: 'user', content: prompt + document.querySelector('p').innerHTML }
            ],
            stream: false
        }),
    });

    const reader = response.body?.getReader();
    if (!reader) {
        throw new Error('Response body is not readable');
    }

    const decoder = new TextDecoder();
    let buffer = '';

    try {
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });

            while (true) {
                const lineEnd = buffer.indexOf('\n');
                if (lineEnd === -1) break;

                const line = buffer.slice(0, lineEnd).trim();
                buffer = buffer.slice(lineEnd + 1);

                
                if (line.startsWith('data: ')) {
                    const data = line.slice(6);
                    if (data === '[DONE]') break;
                    
                    try {
                        const parsed = JSON.parse(data);
                        const content = parsed.choices[0].delta.content;
                        if (content) {
                            console.log(content);
                        }
                    } catch (e) {}
                }
            }
        }
    } finally {
        reader.cancel();
    }
    document.querySelector('p').innerHTML += (JSON.parse(buffer).choices[0]?.message?.content ?? '') + '<br>';
});

</script>
